<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The One-Arm AI Slot Machine</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --neon-green: #39ff14;
    --neon-pink: #ff2d95;
    --neon-blue: #00f0ff;
    --neon-yellow: #ffe600;
    --dark-bg: #0a0a1a;
    --panel-bg: #12122a;
    --reel-bg: #1a1a3e;
  }

  body {
    font-family: 'Orbitron', sans-serif;
    background: var(--dark-bg);
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      linear-gradient(rgba(57,255,20,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(57,255,20,0.03) 1px, transparent 1px);
    background-size: 50px 50px;
    animation: gridScroll 20s linear infinite;
    z-index: 0;
  }

  @keyframes gridScroll {
    to { background-position: 50px 50px; }
  }

  .machine {
    position: relative;
    z-index: 1;
    background: linear-gradient(145deg, #1a1a3e, #0d0d2b);
    border: 3px solid var(--neon-pink);
    border-radius: 24px;
    padding: 32px 36px 28px;
    box-shadow:
      0 0 30px rgba(255,45,149,0.3),
      0 0 60px rgba(255,45,149,0.1),
      inset 0 0 30px rgba(0,0,0,0.5);
    max-width: 520px;
    width: 95%;
  }

  .title {
    font-family: 'Press Start 2P', monospace;
    font-size: 13px;
    text-align: center;
    color: var(--neon-green);
    text-shadow: 0 0 10px var(--neon-green), 0 0 30px var(--neon-green);
    margin-bottom: 6px;
    line-height: 1.6;
    animation: flicker 4s infinite;
  }

  .subtitle {
    text-align: center;
    font-size: 10px;
    color: var(--neon-blue);
    opacity: 0.7;
    margin-bottom: 20px;
    letter-spacing: 2px;
  }

  @keyframes flicker {
    0%, 97%, 100% { opacity: 1; }
    98% { opacity: 0.7; }
    99% { opacity: 0.9; }
  }

  /* Token display */
  .token-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--panel-bg);
    border: 1px solid rgba(0,240,255,0.3);
    border-radius: 12px;
    padding: 10px 18px;
    margin-bottom: 18px;
  }

  .token-label {
    font-size: 10px;
    color: var(--neon-blue);
    letter-spacing: 1px;
  }

  .token-count {
    font-size: 22px;
    font-weight: 900;
    color: var(--neon-yellow);
    text-shadow: 0 0 8px rgba(255,230,0,0.5);
    transition: transform 0.2s;
  }

  .token-count.bump {
    transform: scale(1.3);
  }

  .bet-section {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .bet-label {
    font-size: 9px;
    color: #888;
    letter-spacing: 1px;
  }

  .bet-btn {
    background: none;
    border: 1px solid var(--neon-pink);
    color: var(--neon-pink);
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    width: 28px;
    height: 28px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .bet-btn:hover {
    background: rgba(255,45,149,0.15);
    box-shadow: 0 0 8px rgba(255,45,149,0.3);
  }

  .bet-amount {
    font-size: 16px;
    font-weight: 700;
    color: var(--neon-yellow);
    min-width: 32px;
    text-align: center;
  }

  /* Reels */
  .reels-frame {
    background: #000;
    border: 2px solid rgba(57,255,20,0.4);
    border-radius: 16px;
    padding: 16px 12px;
    margin-bottom: 18px;
    box-shadow: inset 0 0 40px rgba(0,0,0,0.8);
  }

  .reels {
    display: flex;
    justify-content: center;
    gap: 10px;
  }

  .reel {
    width: 120px;
    height: 120px;
    background: var(--reel-bg);
    border: 2px solid rgba(57,255,20,0.2);
    border-radius: 12px;
    overflow: hidden;
    position: relative;
  }

  .reel-strip {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    transition: top 0.1s;
  }

  .reel-symbol {
    width: 100%;
    height: 120px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    user-select: none;
  }

  .reel-symbol .sym-label {
    font-size: 9px;
    margin-top: 4px;
    color: #aaa;
    letter-spacing: 1px;
  }

  /* Win line highlight */
  .reels-frame.win {
    border-color: var(--neon-yellow);
    box-shadow: inset 0 0 40px rgba(255,230,0,0.15), 0 0 20px rgba(255,230,0,0.3);
  }

  /* Lever / Spin button */
  .controls {
    display: flex;
    justify-content: center;
    margin-bottom: 14px;
  }

  .spin-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    padding: 14px 40px;
    background: linear-gradient(180deg, #ff2d95, #cc0066);
    color: #fff;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    box-shadow:
      0 4px 15px rgba(255,45,149,0.5),
      0 0 30px rgba(255,45,149,0.2);
    transition: all 0.15s;
    letter-spacing: 2px;
    position: relative;
    overflow: hidden;
  }

  .spin-btn::after {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: linear-gradient(
      transparent,
      rgba(255,255,255,0.1),
      transparent
    );
    transform: rotate(45deg);
    animation: btnShine 3s infinite;
  }

  @keyframes btnShine {
    0%, 100% { transform: translateX(-100%) rotate(45deg); }
    50% { transform: translateX(100%) rotate(45deg); }
  }

  .spin-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow:
      0 6px 20px rgba(255,45,149,0.6),
      0 0 40px rgba(255,45,149,0.3);
  }

  .spin-btn:active:not(:disabled) {
    transform: translateY(1px);
  }

  .spin-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* Message area */
  .message {
    text-align: center;
    min-height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    line-height: 1.5;
    color: var(--neon-green);
    text-shadow: 0 0 6px rgba(57,255,20,0.4);
    padding: 0 8px;
  }

  .message.lose {
    color: #ff6b6b;
    text-shadow: 0 0 6px rgba(255,107,107,0.4);
  }

  .message.jackpot {
    color: var(--neon-yellow);
    font-family: 'Press Start 2P', monospace;
    font-size: 13px;
    text-shadow: 0 0 15px rgba(255,230,0,0.7);
    animation: jackpotPulse 0.5s ease-in-out infinite alternate;
  }

  @keyframes jackpotPulse {
    to { transform: scale(1.05); text-shadow: 0 0 25px rgba(255,230,0,1); }
  }

  /* Paytable */
  .paytable-toggle {
    text-align: center;
    margin-top: 8px;
  }

  .paytable-toggle button {
    background: none;
    border: 1px solid rgba(0,240,255,0.3);
    color: var(--neon-blue);
    font-family: 'Orbitron', sans-serif;
    font-size: 9px;
    padding: 6px 16px;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
  }

  .paytable-toggle button:hover {
    background: rgba(0,240,255,0.1);
  }

  .paytable {
    display: none;
    margin-top: 12px;
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(0,240,255,0.2);
    border-radius: 10px;
    padding: 12px;
  }

  .paytable.open {
    display: block;
  }

  .paytable h3 {
    font-size: 10px;
    color: var(--neon-blue);
    text-align: center;
    margin-bottom: 8px;
    letter-spacing: 2px;
  }

  .paytable-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 8px;
    font-size: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .paytable-row:last-child { border: none; }

  .paytable-icons {
    display: flex;
    gap: 4px;
    font-size: 20px;
  }

  .paytable-mult {
    color: var(--neon-yellow);
    font-size: 11px;
    font-weight: 700;
  }

  /* Particles */
  .particle {
    position: fixed;
    pointer-events: none;
    z-index: 100;
    font-size: 20px;
    animation: particleFly 1.5s ease-out forwards;
  }

  @keyframes particleFly {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-120px) scale(0.3); }
  }

  /* Responsive */
  @media (max-width: 480px) {
    .machine { padding: 20px 16px 18px; }
    .title { font-size: 10px; }
    .reel { width: 90px; height: 90px; }
    .reel-symbol { height: 90px; font-size: 36px; }
    .reel-symbol .sym-label { font-size: 7px; }
    .spin-btn { font-size: 11px; padding: 12px 28px; }
    .token-count { font-size: 18px; }
  }
</style>
</head>
<body>

<div class="machine">
  <div class="title">THE ONE-ARM<br>AI SLOT MACHINE</div>
  <div class="subtitle">WHERE TOKENS GO TO DIE</div>

  <div class="token-bar">
    <div>
      <div class="token-label">YOUR TOKENS</div>
      <div class="token-count" id="tokenCount">1000</div>
    </div>
    <div class="bet-section">
      <span class="bet-label">BET</span>
      <button class="bet-btn" id="betDown">-</button>
      <span class="bet-amount" id="betAmount">10</span>
      <button class="bet-btn" id="betUp">+</button>
    </div>
  </div>

  <div class="reels-frame" id="reelsFrame">
    <div class="reels" id="reels">
      <div class="reel" id="reel0"><div class="reel-strip" id="strip0"></div></div>
      <div class="reel" id="reel1"><div class="reel-strip" id="strip1"></div></div>
      <div class="reel" id="reel2"><div class="reel-strip" id="strip2"></div></div>
    </div>
  </div>

  <div class="controls">
    <button class="spin-btn" id="spinBtn">PULL LEVER</button>
  </div>

  <div class="message" id="message">Insert tokens and pull the lever...</div>

  <div class="paytable-toggle">
    <button id="paytableBtn">PAYTABLE</button>
  </div>

  <div class="paytable" id="paytable">
    <h3>PAYOUTS (x BET)</h3>
    <div id="paytableRows"></div>
  </div>
</div>

<script>
  // ---- Symbols ----
  const SYMBOLS = [
    { icon: '\u{1F916}', label: 'ChatGPT', weight: 8 },
    { icon: '\u{1F9E0}', label: 'NEURAL NET', weight: 7 },
    { icon: '\u{1F525}', label: 'GPU FIRE', weight: 6 },
    { icon: '\u{1F4B8}', label: 'VC MONEY', weight: 5 },
    { icon: '\u{1F47E}', label: 'AGI DOOM', weight: 4 },
    { icon: '\u{2728}',  label: 'HALLUCINATE', weight: 3 },
    { icon: '\u{1F680}', label: 'TO THE MOON', weight: 2 },
    { icon: '\u{1F4A1}', label: 'SENTIENT?!', weight: 1 },
  ];

  // Payouts: 3-of-a-kind multipliers (rarer = higher payout)
  const PAYOUTS_3 = [5, 8, 12, 18, 30, 50, 100, 500];
  // 2-of-a-kind pays a fraction
  const PAYOUTS_2 = [1, 1, 2, 2, 3, 5, 8, 20];

  // ---- State ----
  let tokens = 1000;
  let bet = 10;
  let spinning = false;
  const BET_STEPS = [5, 10, 25, 50, 100];
  let betIdx = 1;

  // ---- DOM ----
  const tokenCountEl = document.getElementById('tokenCount');
  const betAmountEl = document.getElementById('betAmount');
  const spinBtn = document.getElementById('spinBtn');
  const messageEl = document.getElementById('message');
  const reelsFrame = document.getElementById('reelsFrame');
  const strips = [
    document.getElementById('strip0'),
    document.getElementById('strip1'),
    document.getElementById('strip2'),
  ];

  // ---- Weighted random ----
  function weightedSymbolIndex() {
    const totalWeight = SYMBOLS.reduce((s, sym) => s + sym.weight, 0);
    let r = Math.random() * totalWeight;
    for (let i = 0; i < SYMBOLS.length; i++) {
      r -= SYMBOLS[i].weight;
      if (r <= 0) return i;
    }
    return SYMBOLS.length - 1;
  }

  // ---- Build reel strips ----
  const REEL_LENGTH = 40; // symbols per virtual strip

  function buildStrip(stripEl) {
    stripEl.innerHTML = '';
    const indices = [];
    for (let i = 0; i < REEL_LENGTH; i++) {
      const idx = weightedSymbolIndex();
      indices.push(idx);
      const div = document.createElement('div');
      div.className = 'reel-symbol';
      div.innerHTML = `${SYMBOLS[idx].icon}<span class="sym-label">${SYMBOLS[idx].label}</span>`;
      stripEl.appendChild(div);
    }
    return indices;
  }

  let reelData = strips.map(s => buildStrip(s));

  // ---- Position reels ----
  function setReelPosition(stripEl, index, reelEl) {
    const symbolHeight = reelEl.clientHeight;
    stripEl.style.transition = 'none';
    stripEl.style.top = `-${index * symbolHeight}px`;
  }

  // Initialize
  strips.forEach((s, i) => setReelPosition(s, 0, s.parentElement));

  // ---- Spin animation ----
  function animateReel(stripEl, reelEl, targetIndex, delay) {
    return new Promise(resolve => {
      const symbolHeight = reelEl.clientHeight;
      const totalSymbols = REEL_LENGTH;
      // Spin through many symbols then land on target
      const spinsBeforeLand = 15 + Math.floor(Math.random() * 10);
      const landPos = targetIndex;

      // Jump to top quickly
      stripEl.style.transition = 'none';
      stripEl.style.top = '0px';

      setTimeout(() => {
        // Fast spin phase
        const targetTop = -(landPos * symbolHeight + spinsBeforeLand * symbolHeight);

        // We'll use multiple wraps, so recalculate within bounds
        const effectivePos = landPos;
        const totalTravel = (spinsBeforeLand + effectivePos) * symbolHeight;

        // Simple approach: animate top with CSS
        stripEl.style.transition = `top ${1.2 + delay * 0.3}s cubic-bezier(0.15, 0.85, 0.35, 1)`;
        stripEl.style.top = `-${effectivePos * symbolHeight}px`;

        // For visual effect, we'll do a JS interval for the spin
        let currentPos = 0;
        const speed = 15;
        const interval = setInterval(() => {
          currentPos += speed;
          if (currentPos >= totalTravel) {
            clearInterval(interval);
            stripEl.style.transition = 'none';
            stripEl.style.top = `-${effectivePos * symbolHeight}px`;
            resolve();
            return;
          }
          const wrappedPos = currentPos % (totalSymbols * symbolHeight);
          stripEl.style.transition = 'none';
          stripEl.style.top = `-${wrappedPos}px`;
        }, 16);

        // Override: use timeout-based approach for smoothness
        clearInterval(interval);

        let startTime = null;
        const duration = 1000 + delay * 400;

        function spinFrame(timestamp) {
          if (!startTime) startTime = timestamp;
          const elapsed = timestamp - startTime;
          const progress = Math.min(elapsed / duration, 1);

          // Easing: fast start, slow end
          const eased = 1 - Math.pow(1 - progress, 3);

          const totalDistance = (spinsBeforeLand * symbolHeight) + (effectivePos * symbolHeight);
          const currentDistance = eased * totalDistance;
          const wrappedPos = currentDistance % (totalSymbols * symbolHeight);

          stripEl.style.top = `-${wrappedPos}px`;

          if (progress < 1) {
            requestAnimationFrame(spinFrame);
          } else {
            stripEl.style.top = `-${effectivePos * symbolHeight}px`;
            resolve();
          }
        }

        requestAnimationFrame(spinFrame);
      }, delay * 200);
    });
  }

  // ---- Win messages ----
  const WIN_MESSAGES = [
    "The AI gods smile upon you!",
    "Your prompt engineering paid off!",
    "You've beaten the transformer!",
    "The model overfitted in your favor!",
    "Even GPT couldn't predict this win!",
    "Your gradient descended to profit!",
    "The attention mechanism noticed you!",
    "You found a bug in the loss function!",
  ];

  const LOSE_MESSAGES = [
    "Tokens spent on inference... gone.",
    "The model confidently took your tokens.",
    "Hallucination: you thought you'd win.",
    "Your tokens were used for training data.",
    "API call failed. Tokens non-refundable.",
    "The AI alignment problem: your wallet.",
    "Context window full. Tokens dropped.",
    "Rate limited. Tokens still charged.",
    "Sam Altman thanks you for your donation.",
    "Your tokens have been deprecated.",
    "Error 429: Too many losing requests.",
    "Training run complete. You lost.",
  ];

  const JACKPOT_MESSAGES = [
    "SENTIENT JACKPOT! The singularity pays!",
    "AGI ACHIEVED! (in token payouts)",
    "YOU BROKE THE MODEL! MASSIVE WIN!",
  ];

  function randomFrom(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  // ---- Particles ----
  function spawnParticles(count) {
    const emojis = ['\u{1F4B0}', '\u{2728}', '\u{1F389}', '\u{1F4B8}', '\u{1F31F}'];
    for (let i = 0; i < count; i++) {
      setTimeout(() => {
        const p = document.createElement('div');
        p.className = 'particle';
        p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        p.style.left = `${Math.random() * 80 + 10}%`;
        p.style.top = `${Math.random() * 40 + 30}%`;
        p.style.fontSize = `${Math.random() * 16 + 16}px`;
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 1500);
      }, i * 80);
    }
  }

  // ---- Sound (Web Audio API) ----
  let audioCtx;
  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function playTone(freq, duration, type = 'square', volume = 0.08) {
    try {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(volume, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + duration);
    } catch (e) { /* audio not available */ }
  }

  function playSpinSound() {
    for (let i = 0; i < 8; i++) {
      setTimeout(() => playTone(200 + i * 50, 0.08, 'square', 0.04), i * 60);
    }
  }

  function playWinSound() {
    const notes = [523, 659, 784, 1047];
    notes.forEach((n, i) => setTimeout(() => playTone(n, 0.2, 'sine', 0.1), i * 120));
  }

  function playJackpotSound() {
    const notes = [523, 659, 784, 1047, 1319, 1568];
    notes.forEach((n, i) => setTimeout(() => playTone(n, 0.3, 'sine', 0.12), i * 100));
    setTimeout(() => {
      for (let i = 0; i < 10; i++) {
        setTimeout(() => playTone(1568 + Math.random() * 500, 0.15, 'sine', 0.06), i * 50);
      }
    }, 700);
  }

  function playLoseSound() {
    playTone(200, 0.3, 'sawtooth', 0.05);
    setTimeout(() => playTone(150, 0.4, 'sawtooth', 0.04), 200);
  }

  function playReelStop() {
    playTone(400, 0.05, 'square', 0.06);
  }

  // ---- Core spin logic ----
  async function spin() {
    if (spinning) return;
    if (tokens < bet) {
      messageEl.textContent = "Not enough tokens! The AI wins again...";
      messageEl.className = 'message lose';
      return;
    }

    spinning = true;
    spinBtn.disabled = true;
    reelsFrame.classList.remove('win');
    messageEl.textContent = "Processing your inference request...";
    messageEl.className = 'message';

    // Deduct bet
    tokens -= bet;
    updateTokenDisplay();

    playSpinSound();

    // Rebuild strips and pick results
    reelData = strips.map(s => buildStrip(s));

    const results = [
      weightedSymbolIndex(),
      weightedSymbolIndex(),
      weightedSymbolIndex(),
    ];

    // Animate reels with staggered stops
    const promises = strips.map((s, i) => {
      return animateReel(s, s.parentElement, results[i], i).then(() => {
        playReelStop();
      });
    });

    await Promise.all(promises);

    // Evaluate result
    evaluateResult(results);

    spinning = false;
    spinBtn.disabled = false;

    // Check for game over
    if (tokens <= 0) {
      messageEl.textContent = "OUT OF TOKENS! The AI has consumed them all.";
      messageEl.className = 'message lose';
      setTimeout(() => {
        if (confirm("You're out of tokens! The AI overlords offer you 1000 more tokens... for 'free'. Accept?")) {
          tokens = 1000;
          updateTokenDisplay();
          messageEl.textContent = "Tokens replenished. The AI remembers your desperation.";
          messageEl.className = 'message';
        }
      }, 500);
    }
  }

  function evaluateResult(results) {
    const [a, b, c] = results;

    if (a === b && b === c) {
      // Three of a kind!
      const multiplier = PAYOUTS_3[a];
      const winAmount = bet * multiplier;
      tokens += winAmount;
      updateTokenDisplay(true);
      reelsFrame.classList.add('win');

      if (multiplier >= 100) {
        messageEl.textContent = randomFrom(JACKPOT_MESSAGES) + ` +${winAmount} TOKENS!`;
        messageEl.className = 'message jackpot';
        playJackpotSound();
        spawnParticles(25);
      } else {
        messageEl.textContent = `${randomFrom(WIN_MESSAGES)} +${winAmount} tokens!`;
        messageEl.className = 'message';
        playWinSound();
        spawnParticles(10);
      }
    } else if (a === b || b === c || a === c) {
      // Two of a kind
      const matchIdx = a === b ? a : (b === c ? b : a);
      const multiplier = PAYOUTS_2[matchIdx];
      const winAmount = bet * multiplier;
      tokens += winAmount;
      updateTokenDisplay(true);
      reelsFrame.classList.add('win');
      messageEl.textContent = `Partial match! +${winAmount} tokens. ${randomFrom(WIN_MESSAGES)}`;
      messageEl.className = 'message';
      playWinSound();
      spawnParticles(5);
    } else {
      messageEl.textContent = randomFrom(LOSE_MESSAGES);
      messageEl.className = 'message lose';
      playLoseSound();
    }
  }

  function updateTokenDisplay(animate = false) {
    tokenCountEl.textContent = tokens.toLocaleString();
    if (animate) {
      tokenCountEl.classList.add('bump');
      setTimeout(() => tokenCountEl.classList.remove('bump'), 200);
    }
  }

  // ---- Bet controls ----
  document.getElementById('betUp').addEventListener('click', () => {
    if (spinning) return;
    betIdx = Math.min(betIdx + 1, BET_STEPS.length - 1);
    bet = BET_STEPS[betIdx];
    betAmountEl.textContent = bet;
  });

  document.getElementById('betDown').addEventListener('click', () => {
    if (spinning) return;
    betIdx = Math.max(betIdx - 1, 0);
    bet = BET_STEPS[betIdx];
    betAmountEl.textContent = bet;
  });

  // ---- Spin ----
  spinBtn.addEventListener('click', spin);

  // Keyboard support
  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'Enter') {
      e.preventDefault();
      spin();
    }
  });

  // ---- Paytable ----
  document.getElementById('paytableBtn').addEventListener('click', () => {
    document.getElementById('paytable').classList.toggle('open');
  });

  function buildPaytable() {
    const rows = document.getElementById('paytableRows');
    // Three of a kind
    for (let i = SYMBOLS.length - 1; i >= 0; i--) {
      const s = SYMBOLS[i];
      const div = document.createElement('div');
      div.className = 'paytable-row';
      div.innerHTML = `
        <div class="paytable-icons">${s.icon} ${s.icon} ${s.icon}</div>
        <div class="paytable-mult">x${PAYOUTS_3[i]}</div>
      `;
      rows.appendChild(div);
    }
    // Separator
    const sep = document.createElement('div');
    sep.className = 'paytable-row';
    sep.innerHTML = '<div style="color:#666;font-size:9px;width:100%;text-align:center;">ANY 2 MATCHING</div>';
    rows.appendChild(sep);

    const div2 = document.createElement('div');
    div2.className = 'paytable-row';
    div2.innerHTML = `
      <div class="paytable-icons" style="font-size:16px;">?? = ??</div>
      <div class="paytable-mult">x1 - x20</div>
    `;
    rows.appendChild(div2);
  }

  buildPaytable();

  // ---- Init display ----
  updateTokenDisplay();
</script>

</body>
</html>
