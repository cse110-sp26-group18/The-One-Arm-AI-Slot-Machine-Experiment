<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The One-Arm AI Slot Machine</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at top, #1a0a2e 0%, #0d0015 60%, #000 100%);
    color: #e0d0ff;
    font-family: 'Orbitron', sans-serif;
    overflow: hidden;
  }

  /* Animated background particles */
  .bg-particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .bg-particles span {
    position: absolute;
    width: 3px;
    height: 3px;
    background: #a855f7;
    border-radius: 50%;
    animation: float-up linear infinite;
    opacity: 0;
  }
  @keyframes float-up {
    0%   { transform: translateY(100vh) scale(0); opacity: 0; }
    10%  { opacity: 0.8; }
    90%  { opacity: 0.3; }
    100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
  }

  .machine-wrapper {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(14px, 3vw, 22px);
    text-align: center;
    background: linear-gradient(90deg, #f472b6, #a855f7, #38bdf8, #a855f7, #f472b6);
    background-size: 200% 100%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 3s linear infinite;
    margin-bottom: 4px;
    text-shadow: none;
  }
  @keyframes shimmer { to { background-position: 200% 0; } }

  .subtitle {
    font-size: 11px;
    color: #a78bfa;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  /* Token balance */
  .balance-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    background: linear-gradient(135deg, rgba(88,28,135,0.6), rgba(30,10,60,0.8));
    border: 1px solid #7c3aed;
    border-radius: 40px;
    padding: 8px 24px;
    font-size: 15px;
    box-shadow: 0 0 20px rgba(124,58,237,0.3);
  }
  .balance-bar .token-icon { font-size: 22px; }
  .balance-bar .amount {
    font-weight: 900;
    color: #fbbf24;
    font-size: 20px;
    min-width: 60px;
    text-align: right;
    transition: transform 0.2s;
  }
  .balance-bar .amount.pop {
    transform: scale(1.3);
  }
  .balance-bar .label { color: #c4b5fd; font-size: 11px; }

  /* Machine body */
  .machine {
    background: linear-gradient(180deg, #2d1652 0%, #1a0a30 100%);
    border: 2px solid #7c3aed;
    border-radius: 20px;
    padding: 24px 28px 20px;
    box-shadow:
      0 0 40px rgba(124,58,237,0.25),
      inset 0 1px 0 rgba(255,255,255,0.05);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  /* Reels */
  .reels-frame {
    background: #0a0014;
    border: 2px solid #581c87;
    border-radius: 12px;
    padding: 6px;
    display: flex;
    gap: 6px;
    box-shadow: inset 0 4px 20px rgba(0,0,0,0.8);
  }
  .reel {
    width: 100px;
    height: 120px;
    overflow: hidden;
    border-radius: 8px;
    background: linear-gradient(180deg, rgba(88,28,135,0.15), rgba(0,0,0,0.5));
    position: relative;
  }
  .reel::before, .reel::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    height: 25px;
    z-index: 2;
    pointer-events: none;
  }
  .reel::before { top: 0; background: linear-gradient(to bottom, #0a0014, transparent); }
  .reel::after  { bottom: 0; background: linear-gradient(to top, #0a0014, transparent); }

  .reel-strip {
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: transform 0.1s;
  }
  .reel-strip .symbol {
    width: 100px;
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 52px;
    flex-shrink: 0;
    user-select: none;
  }

  /* Win line indicator */
  .reels-frame.winning {
    border-color: #fbbf24;
    box-shadow: inset 0 4px 20px rgba(0,0,0,0.8), 0 0 30px rgba(251,191,36,0.5);
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .bet-controls {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(88,28,135,0.3);
    border-radius: 30px;
    padding: 4px 12px;
    border: 1px solid #581c87;
  }
  .bet-controls label {
    font-size: 10px;
    color: #a78bfa;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .bet-controls button {
    background: none;
    border: 1px solid #7c3aed;
    color: #c4b5fd;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .bet-controls button:hover { background: #7c3aed; color: #fff; }
  .bet-controls .bet-amount {
    font-weight: 900;
    color: #fbbf24;
    font-size: 18px;
    min-width: 30px;
    text-align: center;
  }

  .spin-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 13px;
    padding: 14px 36px;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    color: #fff;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 2px;
    box-shadow: 0 4px 25px rgba(124,58,237,0.5);
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .spin-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 6px 35px rgba(124,58,237,0.7);
    background: linear-gradient(135deg, #8b5cf6, #c084fc);
  }
  .spin-btn:active:not(:disabled) { transform: translateY(1px); }
  .spin-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* Message area */
  .message-area {
    min-height: 52px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
  }
  .message {
    font-size: 12px;
    font-family: 'Press Start 2P', monospace;
    text-align: center;
    line-height: 1.6;
    min-height: 1.6em;
    transition: opacity 0.3s;
  }
  .message.win {
    color: #fbbf24;
    text-shadow: 0 0 12px rgba(251,191,36,0.6);
    animation: pulse-glow 0.6s ease-in-out 3;
  }
  .message.lose { color: #a78bfa; }
  .message.broke { color: #f87171; }
  .flavor-text {
    font-size: 10px;
    color: #7c6faa;
    font-style: italic;
    font-family: 'Orbitron', sans-serif;
    max-width: 320px;
    text-align: center;
    line-height: 1.4;
  }

  @keyframes pulse-glow {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* Paytable */
  .paytable {
    margin-top: 6px;
    background: rgba(88,28,135,0.15);
    border: 1px solid rgba(124,58,237,0.3);
    border-radius: 12px;
    padding: 12px 18px;
    font-size: 11px;
    width: 100%;
    max-width: 340px;
  }
  .paytable h3 {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: #a855f7;
    text-align: center;
    margin-bottom: 8px;
    letter-spacing: 2px;
  }
  .paytable-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 3px 0;
    border-bottom: 1px solid rgba(124,58,237,0.1);
  }
  .paytable-row:last-child { border-bottom: none; }
  .paytable-symbols { font-size: 18px; }
  .paytable-payout { color: #fbbf24; font-weight: 700; }
  .paytable-name { color: #c4b5fd; font-size: 10px; margin-left: 6px; }

  /* Win celebration overlay */
  .celebration {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 10;
  }
  .confetti {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 2px;
    animation: confetti-fall linear forwards;
    opacity: 0;
  }
  @keyframes confetti-fall {
    0%   { transform: translateY(-10px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 20px;
    font-size: 10px;
    color: #7c6faa;
    margin-top: 4px;
  }
  .stats-bar span strong { color: #c4b5fd; }

  /* Responsive */
  @media (max-width: 420px) {
    .reel { width: 80px; height: 100px; }
    .reel-strip .symbol { width: 80px; height: 100px; font-size: 42px; }
    .spin-btn { padding: 12px 24px; font-size: 11px; }
    .machine { padding: 16px 14px 14px; }
  }
</style>
</head>
<body>

<div class="bg-particles" id="particles"></div>

<div class="machine-wrapper">
  <h1>THE ONE-ARM AI BANDIT</h1>
  <div class="subtitle">Feed the machine your precious tokens</div>

  <div class="balance-bar">
    <span class="token-icon">🪙</span>
    <span class="label">Tokens</span>
    <span class="amount" id="balance">1000</span>
  </div>

  <div class="machine">
    <div class="reels-frame" id="reelsFrame">
      <div class="reel" id="reel0"><div class="reel-strip" id="strip0"></div></div>
      <div class="reel" id="reel1"><div class="reel-strip" id="strip1"></div></div>
      <div class="reel" id="reel2"><div class="reel-strip" id="strip2"></div></div>
    </div>

    <div class="controls">
      <div class="bet-controls">
        <label>Bet</label>
        <button id="betDown">-</button>
        <span class="bet-amount" id="betDisplay">10</span>
        <button id="betUp">+</button>
      </div>
      <button class="spin-btn" id="spinBtn">SPIN</button>
    </div>

    <div class="message-area">
      <div class="message" id="message">Burn some tokens. What could go wrong?</div>
      <div class="flavor-text" id="flavor"></div>
    </div>
  </div>

  <div class="paytable" id="paytable"></div>

  <div class="stats-bar">
    <span>Spins: <strong id="statSpins">0</strong></span>
    <span>Wins: <strong id="statWins">0</strong></span>
    <span>Biggest: <strong id="statBiggest">0</strong></span>
  </div>
</div>

<div class="celebration" id="celebration"></div>

<!-- Sound effects via Web Audio API -->
<script>
(function () {
  // ───── SYMBOLS & CONFIG ─────
  const SYMBOLS = [
    { emoji: '🤖', name: 'Robot',          weight: 8,  multiplier: 50 },
    { emoji: '🧠', name: 'Galaxy Brain',   weight: 5,  multiplier: 25 },
    { emoji: '💀', name: 'Hallucination',  weight: 10, multiplier: 15 },
    { emoji: '🔥', name: 'Dumpster Fire',  weight: 12, multiplier: 10 },
    { emoji: '📉', name: 'Stonks Down',    weight: 15, multiplier: 5  },
    { emoji: '🦜', name: 'Stochastic Parrot', weight: 18, multiplier: 3 },
    { emoji: '💸', name: 'VC Money',       weight: 20, multiplier: 2  },
    { emoji: '☁️', name: 'The Cloud',      weight: 22, multiplier: 1  },
  ];

  // Two-match payouts (2 of 3 match)
  const TWO_MATCH_MULTIPLIER = 0.4; // 40% of the three-match multiplier

  const BET_OPTIONS = [5, 10, 25, 50, 100];
  const STARTING_TOKENS = 1000;

  // ───── STATE ─────
  let balance = STARTING_TOKENS;
  let betIndex = 1; // starts at 10
  let spinning = false;
  let stats = { spins: 0, wins: 0, biggest: 0 };

  // ───── DOM REFS ─────
  const balanceEl   = document.getElementById('balance');
  const betDisplay  = document.getElementById('betDisplay');
  const spinBtn     = document.getElementById('spinBtn');
  const messageEl   = document.getElementById('message');
  const flavorEl    = document.getElementById('flavor');
  const reelsFrame  = document.getElementById('reelsFrame');
  const celebration = document.getElementById('celebration');
  const strips      = [0, 1, 2].map(i => document.getElementById('strip' + i));

  // ───── WEB AUDIO ─────
  let audioCtx;
  function getAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function playTone(freq, duration, type = 'square', volume = 0.08) {
    try {
      const ctx = getAudio();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.value = volume;
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
      osc.connect(gain).connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + duration);
    } catch (e) {}
  }

  function playSpinSound() {
    for (let i = 0; i < 6; i++) {
      setTimeout(() => playTone(200 + i * 80, 0.08, 'square', 0.04), i * 60);
    }
  }

  function playReelStop() {
    playTone(300, 0.1, 'triangle', 0.06);
  }

  function playWinSound(big) {
    const notes = big ? [523, 659, 784, 1047] : [440, 554, 659];
    notes.forEach((n, i) => setTimeout(() => playTone(n, 0.2, 'square', 0.06), i * 120));
  }

  function playLoseSound() {
    playTone(180, 0.3, 'sawtooth', 0.04);
  }

  // ───── WEIGHTED RANDOM ─────
  const totalWeight = SYMBOLS.reduce((s, sym) => s + sym.weight, 0);
  function randomSymbol() {
    let r = Math.random() * totalWeight;
    for (const sym of SYMBOLS) {
      r -= sym.weight;
      if (r <= 0) return sym;
    }
    return SYMBOLS[SYMBOLS.length - 1];
  }

  // ───── BUILD REEL STRIPS ─────
  function buildStrip(stripEl, symbol) {
    // Build a strip with many random symbols, landing on the given symbol
    const count = 20; // symbols in the strip
    stripEl.innerHTML = '';
    for (let i = 0; i < count; i++) {
      const div = document.createElement('div');
      div.className = 'symbol';
      // Last visible symbol (index count-2) is the result
      if (i === count - 2) {
        div.textContent = symbol.emoji;
      } else {
        div.textContent = randomSymbol().emoji;
      }
      stripEl.appendChild(div);
    }
    // Start at the top
    stripEl.style.transition = 'none';
    stripEl.style.transform = 'translateY(0px)';
  }

  function initReels() {
    strips.forEach(strip => {
      const sym = randomSymbol();
      buildStrip(strip, sym);
      // Show the second-to-last symbol
      const offset = -(18 * 120);
      strip.style.transform = `translateY(${offset}px)`;
    });
  }

  // ───── SPIN ─────
  async function spin() {
    const bet = BET_OPTIONS[betIndex];
    if (spinning) return;
    if (balance < bet) {
      messageEl.className = 'message broke';
      messageEl.textContent = 'INSUFFICIENT TOKENS';
      flavorEl.textContent = getFlavorText('broke');
      return;
    }

    spinning = true;
    spinBtn.disabled = true;

    // Deduct bet
    balance -= bet;
    updateBalance();
    stats.spins++;
    updateStats();

    // Pick results
    const results = [randomSymbol(), randomSymbol(), randomSymbol()];

    playSpinSound();
    reelsFrame.classList.remove('winning');

    // Build and animate each reel with staggered stops
    const reelPromises = strips.map((strip, i) => {
      return new Promise(resolve => {
        buildStrip(strip, results[i]);

        // Force reflow
        strip.offsetHeight;

        const targetOffset = -(18 * 120); // land on symbol at index 18

        setTimeout(() => {
          strip.style.transition = `transform ${1.2 + i * 0.4}s cubic-bezier(0.15, 0.8, 0.3, 1)`;
          strip.style.transform = `translateY(${targetOffset}px)`;

          const duration = (1.2 + i * 0.4) * 1000;
          setTimeout(() => {
            playReelStop();
            resolve();
          }, duration);
        }, 50);
      });
    });

    await Promise.all(reelPromises);

    // Evaluate results
    evaluateResult(results, bet);

    spinning = false;
    spinBtn.disabled = false;
  }

  function evaluateResult(results, bet) {
    const [a, b, c] = results;

    // Three of a kind
    if (a.emoji === b.emoji && b.emoji === c.emoji) {
      const payout = bet * a.multiplier;
      balance += payout;
      updateBalance(true);
      reelsFrame.classList.add('winning');
      messageEl.className = 'message win';
      messageEl.textContent = `JACKPOT! +${payout} TOKENS!`;
      flavorEl.textContent = getFlavorText('bigWin', a);
      playWinSound(true);
      spawnConfetti(40);
      stats.wins++;
      stats.biggest = Math.max(stats.biggest, payout);
      updateStats();
      return;
    }

    // Two of a kind
    if (a.emoji === b.emoji || b.emoji === c.emoji || a.emoji === c.emoji) {
      const match = a.emoji === b.emoji ? a : (b.emoji === c.emoji ? b : a);
      const payout = Math.floor(bet * match.multiplier * TWO_MATCH_MULTIPLIER);
      if (payout > 0) {
        balance += payout;
        updateBalance(true);
        reelsFrame.classList.add('winning');
        messageEl.className = 'message win';
        messageEl.textContent = `MATCH! +${payout} TOKENS`;
        flavorEl.textContent = getFlavorText('smallWin', match);
        playWinSound(false);
        spawnConfetti(12);
        stats.wins++;
        stats.biggest = Math.max(stats.biggest, payout);
        updateStats();
        return;
      }
    }

    // Loss
    messageEl.className = 'message lose';
    messageEl.textContent = pickRandom(LOSE_MESSAGES);
    flavorEl.textContent = getFlavorText('lose');
    playLoseSound();
  }

  // ───── UI UPDATES ─────
  function updateBalance(animate) {
    balanceEl.textContent = balance.toLocaleString();
    if (animate) {
      balanceEl.classList.add('pop');
      setTimeout(() => balanceEl.classList.remove('pop'), 200);
    }
  }

  function updateStats() {
    document.getElementById('statSpins').textContent = stats.spins;
    document.getElementById('statWins').textContent = stats.wins;
    document.getElementById('statBiggest').textContent = stats.biggest;
  }

  // ───── FLAVOR TEXT ─────
  const LOSE_MESSAGES = [
    'The AI keeps your tokens.',
    'Better luck next epoch.',
    'Tokens consumed. No output.',
    'Model hallucinated a loss.',
    'Context window: empty.',
    'Your tokens have been deprecated.',
    'Training complete. You lost.',
    'Error 402: Payment required.',
    'Prompt rejected. Tokens burned.',
    'The transformer transformed your tokens into nothing.',
  ];

  const FLAVOR_TEXTS = {
    bigWin: [
      s => `Three ${s.name}s! The singularity pays out!`,
      s => `Wow, triple ${s.name}! Even GPT couldn't predict that.`,
      s => `${s.name} ${s.name} ${s.name}! The AI overlords are pleased.`,
      s => `Triple ${s.name}! Quick, screenshot before it hallucinates away.`,
    ],
    smallWin: [
      s => `Two ${s.name}s — the model is slightly aligned in your favor.`,
      s => `A pair of ${s.name}s. Small win, just like AI "accuracy."`,
      s => `Two ${s.name}s! The AI almost got it right, as usual.`,
    ],
    lose: [
      () => 'Your tokens vanished into the latent space.',
      () => 'The model confidently predicts: you lose.',
      () => 'At least the AI is having a great time with your tokens.',
      () => 'Don\'t worry, the AI will use your tokens responsibly. (It won\'t.)',
      () => 'Tokens gone. Just like your data privacy.',
      () => 'The AI thanks you for your generous donation.',
      () => 'Fun fact: this machine has a 100% satisfaction rate (for the machine).',
      () => 'Your tokens are now part of the training data.',
      () => 'Error: Winning.exe not found.',
      () => 'The algorithm has spoken. It said "lol no."',
    ],
    broke: [
      () => 'You\'re out of tokens! Just like a real AI API bill.',
      () => 'Token limit reached. Please insert credit card.',
      () => 'Congratulations! You\'ve experienced the full AI billing experience.',
      () => 'Rate limited by poverty.',
    ],
  };

  function getFlavorText(type, symbol) {
    const arr = FLAVOR_TEXTS[type];
    if (!arr) return '';
    const fn = pickRandom(arr);
    return fn(symbol);
  }

  function pickRandom(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  // ───── CONFETTI ─────
  function spawnConfetti(count) {
    const colors = ['#fbbf24', '#a855f7', '#f472b6', '#38bdf8', '#34d399', '#fb923c'];
    for (let i = 0; i < count; i++) {
      const el = document.createElement('div');
      el.className = 'confetti';
      el.style.left = Math.random() * 100 + '%';
      el.style.top = '-10px';
      el.style.background = pickRandom(colors);
      el.style.animationDuration = (1.5 + Math.random() * 2) + 's';
      el.style.animationDelay = Math.random() * 0.5 + 's';
      el.style.width = (5 + Math.random() * 6) + 'px';
      el.style.height = (5 + Math.random() * 6) + 'px';
      celebration.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }
  }

  // ───── BACKGROUND PARTICLES ─────
  function initParticles() {
    const container = document.getElementById('particles');
    for (let i = 0; i < 30; i++) {
      const span = document.createElement('span');
      span.style.left = Math.random() * 100 + '%';
      span.style.animationDuration = (4 + Math.random() * 8) + 's';
      span.style.animationDelay = Math.random() * 6 + 's';
      span.style.width = span.style.height = (1 + Math.random() * 3) + 'px';
      container.appendChild(span);
    }
  }

  // ───── PAYTABLE ─────
  function buildPaytable() {
    const table = document.getElementById('paytable');
    let html = '<h3>Paytable</h3>';
    for (const sym of SYMBOLS) {
      html += `
        <div class="paytable-row">
          <span>
            <span class="paytable-symbols">${sym.emoji}${sym.emoji}${sym.emoji}</span>
            <span class="paytable-name">${sym.name}</span>
          </span>
          <span class="paytable-payout">x${sym.multiplier}</span>
        </div>`;
    }
    table.innerHTML = html;
  }

  // ───── BET CONTROLS ─────
  function changeBet(dir) {
    betIndex = Math.max(0, Math.min(BET_OPTIONS.length - 1, betIndex + dir));
    betDisplay.textContent = BET_OPTIONS[betIndex];
  }

  document.getElementById('betDown').addEventListener('click', () => changeBet(-1));
  document.getElementById('betUp').addEventListener('click', () => changeBet(1));
  spinBtn.addEventListener('click', spin);

  // Keyboard: space to spin
  document.addEventListener('keydown', e => {
    if (e.code === 'Space' && !spinning) {
      e.preventDefault();
      spin();
    }
  });

  // ───── INIT ─────
  initParticles();
  buildPaytable();
  initReels();
  updateBalance();
})();
</script>
</body>
</html>
