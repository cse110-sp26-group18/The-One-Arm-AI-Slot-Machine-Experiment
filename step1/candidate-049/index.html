<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The One-Arm AI Slot Machine</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="cabinet">
    <header class="marquee">
      <h1>THE ONE-ARM AI</h1>
      <p class="subtitle">Where Every Spin Costs Tokens&hellip; Literally.</p>
    </header>

    <div class="token-bar">
      <span class="token-label">TOKENS</span>
      <span id="token-count" class="token-count">1000</span>
      <span class="token-unit">tk</span>
    </div>

    <div class="reels-window">
      <div class="reel-container">
        <div class="reel" id="reel-0"></div>
      </div>
      <div class="reel-container">
        <div class="reel" id="reel-1"></div>
      </div>
      <div class="reel-container">
        <div class="reel" id="reel-2"></div>
      </div>
    </div>

    <div id="message" class="message">&nbsp;</div>

    <div class="controls">
      <div class="bet-controls">
        <button id="bet-down" class="bet-btn" aria-label="Decrease bet">&minus;</button>
        <div class="bet-display">
          <span class="bet-label">BET</span>
          <span id="bet-amount">50</span>
          <span class="bet-unit">tk</span>
        </div>
        <button id="bet-up" class="bet-btn" aria-label="Increase bet">+</button>
      </div>
      <button id="spin-btn" class="spin-btn">
        <span class="spin-text">SPIN</span>
      </button>
    </div>

    <div class="paytable">
      <h2>PAYTABLE</h2>
      <div class="paytable-grid" id="paytable"></div>
    </div>

    <div id="history" class="history">
      <h2>PROMPT LOG</h2>
      <ul id="history-list"></ul>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
