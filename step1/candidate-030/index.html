<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The One-Arm AI Slot Machine</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="machine">
    <div class="marquee">
      <h1>THE ONE-ARM AI</h1>
      <p class="subtitle">~ Feed the Machine Your Tokens ~</p>
    </div>

    <div class="token-display">
      <span class="token-icon">&#x1F4B0;</span>
      <span id="tokens">100</span> AI Tokens
    </div>

    <div class="bet-controls">
      <button id="bet-down" class="bet-btn" aria-label="Decrease bet">&#x25C0;</button>
      <span class="bet-label">BET: <span id="bet-amount">1</span></span>
      <button id="bet-up" class="bet-btn" aria-label="Increase bet">&#x25B6;</button>
    </div>

    <div class="reels-frame">
      <div class="reels-window">
        <div class="reel" id="reel-0">
          <div class="reel-strip"></div>
        </div>
        <div class="reel" id="reel-1">
          <div class="reel-strip"></div>
        </div>
        <div class="reel" id="reel-2">
          <div class="reel-strip"></div>
        </div>
      </div>
      <div class="payline"></div>
    </div>

    <div id="message" class="message">Insert tokens and pull the lever!</div>

    <button id="spin-btn" class="lever-btn">
      <span class="lever-text">PULL</span>
      <span class="lever-subtext">the lever</span>
    </button>

    <div class="paytable">
      <h2>PAYTABLE</h2>
      <div class="paytable-grid" id="paytable-grid"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
