<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The One-Arm AI Slot Machine</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --neon-green: #39ff14;
    --neon-pink: #ff2eea;
    --neon-blue: #00d4ff;
    --neon-yellow: #ffe600;
    --cabinet-dark: #0a0a12;
    --cabinet-mid: #14142a;
    --cabinet-light: #1e1e3a;
    --gold: #ffd700;
  }

  body {
    background: var(--cabinet-dark);
    color: #e0e0e0;
    font-family: 'Orbitron', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Scanline overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.08) 2px,
      rgba(0, 0, 0, 0.08) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  /* Floating background particles */
  .bg-particles {
    position: fixed;
    inset: 0;
    overflow: hidden;
    z-index: 0;
    pointer-events: none;
  }
  .bg-particles span {
    position: absolute;
    font-size: 14px;
    opacity: 0.06;
    animation: float-up linear infinite;
  }
  @keyframes float-up {
    0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
    10% { opacity: 0.08; }
    90% { opacity: 0.08; }
    100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
  }

  .machine {
    position: relative;
    z-index: 1;
    width: 420px;
    max-width: 95vw;
    background: linear-gradient(180deg, var(--cabinet-mid) 0%, var(--cabinet-dark) 100%);
    border: 2px solid #2a2a4a;
    border-radius: 24px;
    padding: 24px 20px 28px;
    box-shadow:
      0 0 60px rgba(57, 255, 20, 0.08),
      0 0 120px rgba(0, 212, 255, 0.05),
      inset 0 1px 0 rgba(255,255,255,0.05);
  }

  /* Top marquee */
  .marquee {
    text-align: center;
    padding: 10px 0 16px;
  }
  .marquee h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    line-height: 1.8;
    color: var(--neon-green);
    text-shadow: 0 0 10px var(--neon-green), 0 0 30px var(--neon-green);
    animation: flicker 4s infinite;
  }
  .marquee .subtitle {
    font-size: 9px;
    color: var(--neon-pink);
    margin-top: 6px;
    text-shadow: 0 0 8px var(--neon-pink);
    letter-spacing: 2px;
  }
  @keyframes flicker {
    0%, 95%, 100% { opacity: 1; }
    96% { opacity: 0.7; }
    97% { opacity: 1; }
    98% { opacity: 0.6; }
  }

  /* Token display */
  .token-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(0,0,0,0.4);
    border: 1px solid #2a2a4a;
    border-radius: 10px;
    padding: 8px 14px;
    margin-bottom: 14px;
  }
  .token-bar .label {
    font-size: 9px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .token-bar .tokens {
    font-size: 18px;
    font-weight: 900;
    color: var(--gold);
    text-shadow: 0 0 12px rgba(255, 215, 0, 0.5);
    transition: transform 0.2s;
  }
  .token-bar .tokens.bump {
    transform: scale(1.3);
  }

  /* Reel window */
  .reel-window {
    background: #000;
    border: 2px solid #333;
    border-radius: 14px;
    padding: 12px 8px;
    margin-bottom: 14px;
    box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
    position: relative;
    overflow: hidden;
  }
  .reel-window::before {
    content: '';
    position: absolute;
    left: 8px; right: 8px;
    top: 50%; height: 64px;
    transform: translateY(-50%);
    border-top: 2px solid var(--neon-pink);
    border-bottom: 2px solid var(--neon-pink);
    box-shadow: 0 0 12px var(--neon-pink);
    z-index: 2;
    pointer-events: none;
    border-radius: 4px;
  }
  .reels {
    display: flex;
    justify-content: center;
    gap: 6px;
  }
  .reel-container {
    width: 110px;
    height: 180px;
    overflow: hidden;
    border-radius: 8px;
    background: #0a0a0a;
    position: relative;
  }
  /* Fade edges */
  .reel-container::before,
  .reel-container::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    height: 50px;
    z-index: 1;
    pointer-events: none;
  }
  .reel-container::before {
    top: 0;
    background: linear-gradient(to bottom, #0a0a0a 0%, transparent 100%);
  }
  .reel-container::after {
    bottom: 0;
    background: linear-gradient(to top, #0a0a0a 0%, transparent 100%);
  }
  .reel-strip {
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: transform 0.05s linear;
  }
  .reel-symbol {
    width: 110px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    flex-shrink: 0;
    user-select: none;
  }

  /* Result message */
  .result {
    min-height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    margin-bottom: 10px;
    padding: 6px;
  }
  .result .msg {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    line-height: 1.7;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .result .msg.visible {
    opacity: 1;
  }
  .result .msg.win {
    color: var(--neon-green);
    text-shadow: 0 0 10px var(--neon-green);
  }
  .result .msg.lose {
    color: #ff4444;
    text-shadow: 0 0 8px rgba(255,68,68,0.5);
  }
  .result .msg.jackpot {
    color: var(--gold);
    text-shadow: 0 0 15px var(--gold), 0 0 30px var(--gold);
    animation: jackpot-flash 0.3s ease infinite alternate;
  }
  @keyframes jackpot-flash {
    from { text-shadow: 0 0 15px var(--gold), 0 0 30px var(--gold); }
    to { text-shadow: 0 0 25px var(--gold), 0 0 50px #fff, 0 0 80px var(--gold); }
  }

  /* Bet controls */
  .bet-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .bet-row .label {
    font-size: 9px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .bet-btn {
    width: 32px; height: 32px;
    background: var(--cabinet-light);
    border: 1px solid #444;
    border-radius: 8px;
    color: #fff;
    font-size: 18px;
    font-family: 'Orbitron', monospace;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .bet-btn:hover { border-color: var(--neon-blue); color: var(--neon-blue); }
  .bet-btn:active { transform: scale(0.9); }
  .bet-display {
    font-size: 20px;
    font-weight: 900;
    color: var(--neon-blue);
    min-width: 50px;
    text-align: center;
    text-shadow: 0 0 8px rgba(0,212,255,0.4);
  }

  /* Spin button — the lever */
  .spin-area {
    display: flex;
    justify-content: center;
    margin-bottom: 10px;
  }
  .spin-btn {
    width: 100%;
    padding: 16px 0;
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    color: #000;
    background: linear-gradient(180deg, #ffe066 0%, var(--gold) 40%, #cc9900 100%);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 2px;
    box-shadow: 0 4px 20px rgba(255,215,0,0.3), inset 0 1px 0 rgba(255,255,255,0.4);
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }
  .spin-btn::after {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: linear-gradient(
      45deg,
      transparent 40%,
      rgba(255,255,255,0.15) 50%,
      transparent 60%
    );
    animation: btn-shine 3s infinite;
  }
  @keyframes btn-shine {
    0% { transform: translateX(-100%) rotate(0deg); }
    100% { transform: translateX(100%) rotate(0deg); }
  }
  .spin-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 30px rgba(255,215,0,0.5), inset 0 1px 0 rgba(255,255,255,0.4);
  }
  .spin-btn:active {
    transform: translateY(1px);
    box-shadow: 0 2px 10px rgba(255,215,0,0.3);
  }
  .spin-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  /* Stats footer */
  .stats {
    display: flex;
    justify-content: space-around;
    padding-top: 10px;
    border-top: 1px solid #1a1a3a;
    font-size: 8px;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .stats span { text-align: center; }
  .stats .val {
    display: block;
    font-size: 13px;
    color: #aaa;
    margin-top: 3px;
    font-weight: 700;
  }

  /* Paytable toggle */
  .paytable-toggle {
    text-align: center;
    margin-top: 14px;
  }
  .paytable-toggle button {
    background: none;
    border: 1px solid #333;
    color: #666;
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    padding: 6px 16px;
    border-radius: 6px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  .paytable-toggle button:hover { border-color: var(--neon-blue); color: var(--neon-blue); }
  .paytable {
    display: none;
    margin-top: 12px;
    background: rgba(0,0,0,0.5);
    border: 1px solid #222;
    border-radius: 10px;
    padding: 14px;
    font-size: 11px;
  }
  .paytable.open { display: block; }
  .paytable table {
    width: 100%;
    border-collapse: collapse;
  }
  .paytable th {
    text-align: left;
    color: #666;
    font-size: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding-bottom: 6px;
  }
  .paytable td {
    padding: 4px 0;
    border-top: 1px solid #1a1a1a;
  }
  .paytable .symbols { font-size: 20px; }
  .paytable .payout {
    text-align: right;
    color: var(--gold);
    font-weight: 700;
  }
  .paytable .combo-name {
    font-size: 9px;
    color: #888;
    padding-left: 8px;
  }

  /* Win confetti canvas */
  #confetti {
    position: fixed;
    inset: 0;
    z-index: 999;
    pointer-events: none;
  }

  /* Bankrupt overlay */
  .bankrupt-overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.92);
    border-radius: 24px;
    z-index: 50;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 30px;
  }
  .bankrupt-overlay.show { display: flex; }
  .bankrupt-overlay h2 {
    font-family: 'Press Start 2P', monospace;
    font-size: 12px;
    color: #ff4444;
    text-shadow: 0 0 12px #ff4444;
    text-align: center;
    line-height: 2;
  }
  .bankrupt-overlay p {
    font-size: 11px;
    color: #888;
    text-align: center;
    line-height: 1.6;
  }
  .bankrupt-overlay button {
    margin-top: 6px;
    padding: 12px 28px;
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    background: linear-gradient(180deg, #ffe066 0%, var(--gold) 40%, #cc9900 100%);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    color: #000;
  }

  /* Screen shake on loss */
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }
  .machine.shake { animation: shake 0.4s ease; }

  /* Sound toggle */
  .sound-toggle {
    position: absolute;
    top: 12px;
    right: 14px;
    background: none;
    border: none;
    color: #555;
    font-size: 18px;
    cursor: pointer;
    z-index: 10;
    transition: color 0.2s;
  }
  .sound-toggle:hover { color: #aaa; }
</style>
</head>
<body>

<div class="bg-particles" id="bgParticles"></div>
<canvas id="confetti"></canvas>

<div class="machine" id="machine">
  <button class="sound-toggle" id="soundToggle" title="Toggle sound">&#x1f50a;</button>

  <div class="marquee">
    <h1>THE ONE-ARM<br>AI SLOT MACHINE</h1>
    <div class="subtitle">&#9; "Your tokens. Our hallucinations."</div>
  </div>

  <div class="token-bar">
    <span class="label">Token Balance</span>
    <span class="tokens" id="tokenDisplay">1000</span>
  </div>

  <div class="reel-window">
    <div class="reels" id="reels">
      <div class="reel-container"><div class="reel-strip" id="reel0"></div></div>
      <div class="reel-container"><div class="reel-strip" id="reel1"></div></div>
      <div class="reel-container"><div class="reel-strip" id="reel2"></div></div>
    </div>
  </div>

  <div class="result">
    <div class="msg" id="resultMsg"></div>
  </div>

  <div class="bet-row">
    <span class="label">Bet</span>
    <button class="bet-btn" id="betDown">-</button>
    <span class="bet-display" id="betDisplay">10</span>
    <button class="bet-btn" id="betUp">+</button>
  </div>

  <div class="spin-area">
    <button class="spin-btn" id="spinBtn">PULL THE LEVER</button>
  </div>

  <div class="stats">
    <span>Spins<span class="val" id="statSpins">0</span></span>
    <span>Wins<span class="val" id="statWins">0</span></span>
    <span>Biggest Win<span class="val" id="statBiggest">0</span></span>
  </div>

  <div class="paytable-toggle">
    <button id="paytableBtn">PAYTABLE</button>
  </div>
  <div class="paytable" id="paytable">
    <table>
      <thead><tr><th>Combo</th><th></th><th style="text-align:right">Payout</th></tr></thead>
      <tbody id="paytableBody"></tbody>
    </table>
  </div>

  <div class="bankrupt-overlay" id="bankruptOverlay">
    <h2>TOKEN LIMIT<br>EXCEEDED</h2>
    <p>"We've run out of context window.<br>Please insert more funding."</p>
    <button id="restartBtn">FINE-TUNE (Restart)</button>
  </div>
</div>

<script>
// ─── Symbol definitions ───
const SYMBOLS = [
  { emoji: '\u{1F916}', name: 'Robot',       weight: 8  },
  { emoji: '\u{1F9E0}', name: 'Brain',       weight: 7  },
  { emoji: '\u{1F4A1}', name: 'Lightbulb',   weight: 6  },
  { emoji: '\u{26A1}',  name: 'Lightning',   weight: 5  },
  { emoji: '\u{1F4BB}', name: 'Laptop',      weight: 5  },
  { emoji: '\u{1F440}', name: 'Eyes',        weight: 4  },
  { emoji: '\u{2728}',  name: 'Sparkles',    weight: 3  },
  { emoji: '\u{1F525}', name: 'Fire',        weight: 2  },
];

// ─── Payout table ───
// Three-of-a-kind payouts (multiplier of bet)
const TRIPLE_PAYOUTS = {
  '\u{1F525}': { mult: 50, label: 'GPU MELTDOWN' },
  '\u{2728}':  { mult: 25, label: 'EMERGENT BEHAVIOR' },
  '\u{1F440}': { mult: 15, label: 'THE SINGULARITY STARES BACK' },
  '\u{1F4BB}': { mult: 10, label: 'STACK OVERFLOW' },
  '\u{26A1}':  { mult: 8,  label: 'OVERCLOCKED' },
  '\u{1F4A1}': { mult: 5,  label: 'PROMPT INJECTION' },
  '\u{1F9E0}': { mult: 4,  label: 'NEURAL NETWORK' },
  '\u{1F916}': { mult: 3,  label: 'BASIC CHATBOT' },
};

// Two-of-a-kind base payout
const PAIR_MULT = 1.5;

// ─── Funny messages ───
const WIN_MESSAGES = [
  "AGI achieved! (for your wallet)",
  "Training complete! Reward acquired!",
  "Model converged on PROFIT!",
  "Your inference was correct!",
  "Tokens generated successfully!",
  "Benchmark: CRUSHED",
  "Loss function at all-time low!",
  "You passed the Turing test of luck!",
];
const LOSE_MESSAGES = [
  "Hallucination detected...",
  "Model collapsed. No output.",
  "Tokens burned in training...",
  "RLHF says: try again, human.",
  "Your prompt was too vague.",
  "Context window exceeded.",
  "Alignment failure: no reward.",
  "Temperature too high. Gibberish.",
  "That response was confabulated.",
  "Catastrophic forgetting in 3...2...1",
  "The AI ate your tokens.",
  "Overfitting to bad luck.",
];
const JACKPOT_MESSAGES = [
  "SUPERINTELLIGENCE UNLOCKED!!!",
  "YOU BROKE THE SAFETY GUARDRAILS!!!",
  "PAPERCLIP MAXIMIZER ACTIVATED!!!",
  "THE SINGULARITY IS HERE!!!",
];

// ─── State ───
let tokens = 1000;
let bet = 10;
let spinning = false;
let totalSpins = 0;
let totalWins = 0;
let biggestWin = 0;
let soundOn = true;

const BET_STEPS = [5, 10, 25, 50, 100, 250];

// ─── Audio via Web Audio API ───
let audioCtx;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq, duration, type = 'square', gainVal = 0.08) {
  if (!soundOn) return;
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, ctx.currentTime);
  gain.gain.setValueAtTime(gainVal, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + duration);
}

function sfxSpin() {
  for (let i = 0; i < 3; i++) {
    setTimeout(() => playTone(200 + i * 80, 0.08, 'square', 0.05), i * 40);
  }
}

function sfxReelStop() {
  playTone(440, 0.1, 'sine', 0.1);
}

function sfxWin() {
  const notes = [523, 659, 784, 1047];
  notes.forEach((n, i) => setTimeout(() => playTone(n, 0.2, 'sine', 0.1), i * 100));
}

function sfxJackpot() {
  const notes = [523, 659, 784, 1047, 1319, 1568];
  notes.forEach((n, i) => setTimeout(() => playTone(n, 0.35, 'sine', 0.12), i * 120));
}

function sfxLose() {
  playTone(180, 0.3, 'sawtooth', 0.06);
  setTimeout(() => playTone(120, 0.4, 'sawtooth', 0.05), 150);
}

// ─── Weighted random symbol picker ───
function weightedRandom() {
  const totalWeight = SYMBOLS.reduce((s, sym) => s + sym.weight, 0);
  let r = Math.random() * totalWeight;
  for (const sym of SYMBOLS) {
    r -= sym.weight;
    if (r <= 0) return sym;
  }
  return SYMBOLS[0];
}

// ─── Build reel strips ───
const VISIBLE = 3; // symbols visible in window
const SYMBOL_HEIGHT = 60;
const REEL_ELEMENTS = [];

function buildReels() {
  for (let r = 0; r < 3; r++) {
    const strip = document.getElementById('reel' + r);
    strip.innerHTML = '';
    const syms = [];
    for (let i = 0; i < VISIBLE; i++) {
      const s = weightedRandom();
      const div = document.createElement('div');
      div.className = 'reel-symbol';
      div.textContent = s.emoji;
      strip.appendChild(div);
      syms.push(s);
    }
    REEL_ELEMENTS[r] = { strip, syms, offset: 0 };
  }
}

// ─── Spin logic ───
function spin() {
  if (spinning) return;
  if (tokens < bet) {
    showBankrupt();
    return;
  }

  spinning = true;
  tokens -= bet;
  totalSpins++;
  updateDisplay();
  hideResult();
  sfxSpin();
  document.getElementById('spinBtn').disabled = true;

  // Pick final results
  const results = [weightedRandom(), weightedRandom(), weightedRandom()];

  // Animate each reel
  const baseCycles = 15; // full symbol cycles
  const reelPromises = [];

  for (let r = 0; r < 3; r++) {
    const totalCycles = baseCycles + r * 8;
    const strip = REEL_ELEMENTS[r].strip;

    reelPromises.push(new Promise(resolve => {
      let step = 0;
      const totalSteps = totalCycles;
      let currentOffset = 0;

      // Prepopulate the strip with enough symbols to scroll
      strip.innerHTML = '';
      const allSyms = [];
      for (let i = 0; i < totalSteps + VISIBLE; i++) {
        const s = (i >= totalSteps) ? results[r] : weightedRandom();
        const div = document.createElement('div');
        div.className = 'reel-symbol';
        div.textContent = s.emoji;
        strip.appendChild(div);
        allSyms.push(s);
      }

      // Position strip so first symbols are visible
      strip.style.transition = 'none';
      strip.style.transform = 'translateY(0)';

      const spinInterval = () => {
        if (step >= totalSteps) {
          // Final position: show the last VISIBLE symbols, center row is index 1
          const finalY = -(totalSteps) * SYMBOL_HEIGHT;
          strip.style.transition = 'transform 0.3s cubic-bezier(0.2, 0.8, 0.3, 1.1)';
          strip.style.transform = `translateY(${finalY}px)`;
          sfxReelStop();
          setTimeout(resolve, 320);
          return;
        }

        // Easing: start fast, slow down toward end
        const progress = step / totalSteps;
        const delay = 30 + progress * progress * 180;

        currentOffset = -(step * SYMBOL_HEIGHT);
        strip.style.transition = 'none';
        strip.style.transform = `translateY(${currentOffset}px)`;
        step++;
        setTimeout(spinInterval, delay);
      };

      setTimeout(spinInterval, r * 150);
    }));
  }

  Promise.all(reelPromises).then(() => {
    evaluateResult(results);
    spinning = false;
    document.getElementById('spinBtn').disabled = false;
  });
}

// ─── Evaluate spin results ───
function evaluateResult(results) {
  const emojis = results.map(s => s.emoji);
  const [a, b, c] = emojis;

  let winAmount = 0;
  let msgClass = 'lose';
  let msg = '';

  if (a === b && b === c) {
    // Triple!
    const payout = TRIPLE_PAYOUTS[a];
    winAmount = bet * payout.mult;
    msgClass = payout.mult >= 25 ? 'jackpot' : 'win';
    msg = payout.label + '<br>+' + winAmount.toLocaleString() + ' tokens!';

    if (msgClass === 'jackpot') {
      sfxJackpot();
      fireConfetti();
      msg = randomFrom(JACKPOT_MESSAGES) + '<br>' + payout.label + '<br>+' + winAmount.toLocaleString() + ' tokens!';
    } else {
      sfxWin();
    }
  } else if (a === b || b === c || a === c) {
    // Pair
    winAmount = Math.floor(bet * PAIR_MULT);
    msgClass = 'win';
    msg = randomFrom(WIN_MESSAGES) + '<br>+' + winAmount.toLocaleString() + ' tokens';
    sfxWin();
  } else {
    // Loss
    msgClass = 'lose';
    msg = randomFrom(LOSE_MESSAGES);
    sfxLose();
    document.getElementById('machine').classList.add('shake');
    setTimeout(() => document.getElementById('machine').classList.remove('shake'), 400);
  }

  if (winAmount > 0) {
    tokens += winAmount;
    totalWins++;
    if (winAmount > biggestWin) biggestWin = winAmount;
  }

  showResult(msg, msgClass);
  updateDisplay();

  if (tokens < BET_STEPS[0]) {
    setTimeout(showBankrupt, 800);
  }
}

// ─── UI helpers ───
function updateDisplay() {
  const td = document.getElementById('tokenDisplay');
  td.textContent = tokens.toLocaleString();
  td.classList.add('bump');
  setTimeout(() => td.classList.remove('bump'), 200);

  document.getElementById('betDisplay').textContent = bet;
  document.getElementById('statSpins').textContent = totalSpins;
  document.getElementById('statWins').textContent = totalWins;
  document.getElementById('statBiggest').textContent = biggestWin.toLocaleString();
}

function showResult(html, cls) {
  const el = document.getElementById('resultMsg');
  el.innerHTML = html;
  el.className = 'msg visible ' + cls;
}

function hideResult() {
  const el = document.getElementById('resultMsg');
  el.className = 'msg';
}

function showBankrupt() {
  document.getElementById('bankruptOverlay').classList.add('show');
}

function restart() {
  tokens = 1000;
  bet = 10;
  totalSpins = 0;
  totalWins = 0;
  biggestWin = 0;
  document.getElementById('bankruptOverlay').classList.remove('show');
  hideResult();
  updateDisplay();
  buildReels();
}

function randomFrom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

// ─── Confetti ───
const confettiCanvas = document.getElementById('confetti');
const confettiCtx = confettiCanvas.getContext('2d');
let confettiPieces = [];
let confettiRunning = false;

function resizeConfetti() {
  confettiCanvas.width = window.innerWidth;
  confettiCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeConfetti);
resizeConfetti();

function fireConfetti() {
  confettiPieces = [];
  const emojis = ['\u{1F916}', '\u{1F9E0}', '\u{2728}', '\u{1F525}', '\u{1F4B0}', '\u{1F389}', '\u{1F680}'];
  for (let i = 0; i < 80; i++) {
    confettiPieces.push({
      x: Math.random() * confettiCanvas.width,
      y: -20 - Math.random() * 200,
      vx: (Math.random() - 0.5) * 6,
      vy: Math.random() * 4 + 2,
      rotation: Math.random() * 360,
      rotSpeed: (Math.random() - 0.5) * 10,
      emoji: emojis[Math.floor(Math.random() * emojis.length)],
      size: 14 + Math.random() * 16,
      life: 1,
    });
  }
  if (!confettiRunning) {
    confettiRunning = true;
    animateConfetti();
  }
}

function animateConfetti() {
  confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
  confettiPieces = confettiPieces.filter(p => p.life > 0);

  if (confettiPieces.length === 0) {
    confettiRunning = false;
    return;
  }

  for (const p of confettiPieces) {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.1;
    p.rotation += p.rotSpeed;
    p.life -= 0.005;

    confettiCtx.save();
    confettiCtx.translate(p.x, p.y);
    confettiCtx.rotate(p.rotation * Math.PI / 180);
    confettiCtx.globalAlpha = Math.max(0, p.life);
    confettiCtx.font = p.size + 'px serif';
    confettiCtx.textAlign = 'center';
    confettiCtx.fillText(p.emoji, 0, 0);
    confettiCtx.restore();
  }

  requestAnimationFrame(animateConfetti);
}

// ─── Background particles ───
function createBgParticles() {
  const container = document.getElementById('bgParticles');
  const bits = ['0', '1', '{', '}', '<', '>', '/', 'AI', 'NaN', '404', 'null', 'GPU', 'LLM', 'token'];
  for (let i = 0; i < 30; i++) {
    const span = document.createElement('span');
    span.textContent = bits[Math.floor(Math.random() * bits.length)];
    span.style.left = Math.random() * 100 + '%';
    span.style.animationDuration = (15 + Math.random() * 25) + 's';
    span.style.animationDelay = -(Math.random() * 30) + 's';
    span.style.fontSize = (10 + Math.random() * 12) + 'px';
    container.appendChild(span);
  }
}

// ─── Build paytable ───
function buildPaytable() {
  const tbody = document.getElementById('paytableBody');
  const entries = Object.entries(TRIPLE_PAYOUTS).sort((a, b) => b[1].mult - a[1].mult);
  for (const [emoji, data] of entries) {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="symbols">${emoji}${emoji}${emoji}</td>
      <td class="combo-name">${data.label}</td>
      <td class="payout">${data.mult}x</td>
    `;
    tbody.appendChild(tr);
  }
  // Add pair row
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td class="symbols" style="font-size:16px">Any Pair</td>
    <td class="combo-name">DÉJÀ VU</td>
    <td class="payout">${PAIR_MULT}x</td>
  `;
  tbody.appendChild(tr);
}

// ─── Event listeners ───
document.getElementById('spinBtn').addEventListener('click', spin);

document.getElementById('betUp').addEventListener('click', () => {
  if (spinning) return;
  const idx = BET_STEPS.indexOf(bet);
  if (idx < BET_STEPS.length - 1) {
    bet = BET_STEPS[idx + 1];
    if (bet > tokens) bet = BET_STEPS[idx];
    updateDisplay();
  }
});

document.getElementById('betDown').addEventListener('click', () => {
  if (spinning) return;
  const idx = BET_STEPS.indexOf(bet);
  if (idx > 0) {
    bet = BET_STEPS[idx - 1];
    updateDisplay();
  }
});

document.getElementById('paytableBtn').addEventListener('click', () => {
  document.getElementById('paytable').classList.toggle('open');
});

document.getElementById('restartBtn').addEventListener('click', restart);

document.getElementById('soundToggle').addEventListener('click', () => {
  soundOn = !soundOn;
  document.getElementById('soundToggle').textContent = soundOn ? '\u{1F50A}' : '\u{1F507}';
});

// Spacebar to spin
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && !e.repeat) {
    e.preventDefault();
    spin();
  }
});

// ─── Init ───
buildReels();
buildPaytable();
createBgParticles();
updateDisplay();
</script>
</body>
</html>
