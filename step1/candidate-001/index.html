<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Token Slot Machine</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="machine">
    <h1>🤖 AI Token Casino 🎰</h1>
    <p class="subtitle">Where your tokens go to die</p>

    <div class="token-display">
      <span>Tokens: <strong id="token-count">100</strong></span>
    </div>

    <div class="reels-container">
      <div class="reel" id="reel-1">🧠</div>
      <div class="reel" id="reel-2">🧠</div>
      <div class="reel" id="reel-3">🧠</div>
    </div>

    <div class="message" id="message">Pull the lever to hallucinate your winnings!</div>

    <div class="controls">
      <label for="bet">Bet (tokens):</label>
      <input type="number" id="bet" value="10" min="1" max="100" />
      <button id="spin-btn" onclick="spin()">🎰 SPIN (spend tokens)</button>
    </div>

    <div class="history" id="history">
      <h3>Recent Hallucinations</h3>
      <ul id="history-list"></ul>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
